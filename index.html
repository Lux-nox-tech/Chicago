<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicago by Night — 1992</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="data.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        blood: { 50:'#fef2f2',100:'#fde8e8',200:'#fcd5d5',300:'#f8a4a4',400:'#f87171',500:'#dc2626',600:'#b91c1c',700:'#991b1b',800:'#7f1d1d',900:'#5c1010',950:'#3b0707' },
                        night: { 50:'#1a1a2e',100:'#16162a',200:'#121226',300:'#0f0f22',400:'#0c0c1e',500:'#09091a',600:'#070716',700:'#050512',800:'#03030e',900:'#01010a' },
                        ash: { 400:'#9ca3af',500:'#6b7280',600:'#4b5563',700:'#374151',800:'#1f2937',900:'#111827' }
                    },
                    fontFamily: { cinzel:['Cinzel','serif'], cormorant:['Cormorant Garamond','serif'], body:['Inter','sans-serif'] }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#09091a}::-webkit-scrollbar-thumb{background:#3b0707;border-radius:3px}::selection{background:#991b1b;color:#fef2f2}
        .rain-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;overflow:hidden}
        .raindrop{position:absolute;top:-20px;width:1px;background:linear-gradient(transparent,rgba(180,180,200,0.3));animation:fall linear infinite}
        @keyframes fall{0%{transform:translateY(-20px);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(100vh);opacity:0}}
        .fog{position:fixed;bottom:0;left:0;width:200%;height:30%;background:linear-gradient(transparent,rgba(9,9,26,0.6) 30%,rgba(9,9,26,0.9));animation:fogDrift 25s linear infinite;pointer-events:none;z-index:2}
        @keyframes fogDrift{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
        .neon-text{text-shadow:0 0 7px rgba(220,38,38,0.6),0 0 20px rgba(220,38,38,0.4),0 0 42px rgba(220,38,38,0.2),0 0 82px rgba(220,38,38,0.1);animation:neonPulse 3s ease-in-out infinite alternate}
        @keyframes neonPulse{from{text-shadow:0 0 7px rgba(220,38,38,0.6),0 0 20px rgba(220,38,38,0.4),0 0 42px rgba(220,38,38,0.2)}to{text-shadow:0 0 4px rgba(220,38,38,0.4),0 0 12px rgba(220,38,38,0.2),0 0 24px rgba(220,38,38,0.1)}}
        .neon-flicker{animation:flicker 4s infinite}
        @keyframes flicker{0%,19%,21%,23%,25%,54%,56%,100%{opacity:1}20%,24%,55%{opacity:0.4}}
        .flip-card{perspective:1000px;cursor:pointer}.flip-card-inner{transition:transform 0.8s cubic-bezier(0.4,0,0.2,1);transform-style:preserve-3d;position:relative;width:100%;height:100%}.flip-card.flipped .flip-card-inner{transform:rotateY(180deg)}.flip-card-front,.flip-card-back{backface-visibility:hidden;position:absolute;width:100%;height:100%;top:0;left:0}.flip-card-back{transform:rotateY(180deg)}
        .glyph-spin{animation:glyphSpin 20s linear infinite}@keyframes glyphSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        .fade-in{opacity:0;transform:translateY(30px);transition:opacity 0.8s ease,transform 0.8s ease}.fade-in.visible{opacity:1;transform:translateY(0)}
        .modal-overlay{opacity:0;pointer-events:none;transition:opacity 0.4s ease}.modal-overlay.active{opacity:1;pointer-events:auto}.modal-content{transform:scale(0.9) translateY(20px);transition:transform 0.4s cubic-bezier(0.4,0,0.2,1)}.modal-overlay.active .modal-content{transform:scale(1) translateY(0)}
        .blood-drip{position:relative}.blood-drip::after{content:'';position:absolute;bottom:-8px;left:50%;width:3px;height:15px;background:linear-gradient(#dc2626,transparent);border-radius:0 0 3px 3px;animation:drip 3s ease-in infinite}
        @keyframes drip{0%,100%{height:15px;opacity:1}70%{height:25px;opacity:0.6}90%{height:30px;opacity:0}}
        .ticker-scroll{animation:tickerScroll 30s linear infinite}@keyframes tickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
        .glitch{position:relative}.glitch::before,.glitch::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%}.glitch::before{color:#0ff;animation:glitch1 2s infinite;clip-path:inset(0 0 80% 0)}.glitch::after{color:#f00;animation:glitch2 2s infinite;clip-path:inset(80% 0 0 0)}
        @keyframes glitch1{0%,100%{transform:translate(0)}20%{transform:translate(-2px,2px)}40%{transform:translate(2px,-2px)}60%{transform:translate(-1px,1px)}}
        @keyframes glitch2{0%,100%{transform:translate(0)}20%{transform:translate(2px,-2px)}40%{transform:translate(-2px,2px)}60%{transform:translate(1px,-1px)}}
        .heartbeat-line{stroke-dasharray:1000;stroke-dashoffset:1000;animation:drawLine 3s ease forwards,pulseOpacity 2s ease-in-out 3s infinite}@keyframes drawLine{to{stroke-dashoffset:0}}@keyframes pulseOpacity{0%,100%{opacity:0.3}50%{opacity:1}}
        body{background:#09091a}
    </style>
</head>
<body class="font-body text-gray-300 overflow-x-hidden">
    <div class="rain-container" id="rain"></div>
    <div class="fog"></div>

    <nav class="fixed top-0 w-full z-50 border-b border-blood-950/50" style="background:rgba(9,9,26,0.85);backdrop-filter:blur(16px)">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3"><div class="w-8 h-8 rounded-full border border-blood-700 flex items-center justify-center"><div class="w-3 h-3 rounded-full bg-blood-600 animate-pulse"></div></div><span class="font-cinzel text-sm tracking-[0.2em] text-blood-400 uppercase">Chicago</span></div>
            <div class="hidden md:flex items-center gap-8">
                <a href="#rumeurs" class="text-xs tracking-[0.15em] uppercase text-gray-500 hover:text-blood-400 transition-colors">Rumeurs</a>
                <a href="#factions" class="text-xs tracking-[0.15em] uppercase text-gray-500 hover:text-blood-400 transition-colors">Factions</a>
                <a href="#necro" class="text-xs tracking-[0.15em] uppercase text-gray-500 hover:text-blood-400 transition-colors">Nécrologie</a>
                <a href="#contacts" class="text-xs tracking-[0.15em] uppercase text-gray-500 hover:text-blood-400 transition-colors">Contacts</a>
                <a href="#chrono" class="text-xs tracking-[0.15em] uppercase text-gray-500 hover:text-blood-400 transition-colors">Chronologie</a>
            </div>
            <button id="menuBtn" class="md:hidden text-gray-500 hover:text-blood-400 transition-colors"><iconify-icon icon="lucide:menu" width="20"></iconify-icon></button>
        </div>
        <div id="mobileMenu" class="md:hidden hidden border-t border-blood-950/50 px-6 pb-4" style="background:rgba(9,9,26,0.95)">
            <a href="#rumeurs" class="block py-3 text-xs tracking-[0.15em] uppercase text-gray-500 hover:text-blood-400">Rumeurs</a>
            <a href="#factions" class="block py-3 text-xs tracking-[0.15em] uppercase text-gray-500 hover:text-blood-400">Factions</a>
            <a href="#necro" class="block py-3 text-xs tracking-[0.15em] uppercase text-gray-500 hover:text-blood-400">Nécrologie</a>
            <a href="#contacts" class="block py-3 text-xs tracking-[0.15em] uppercase text-gray-500 hover:text-blood-400">Contacts</a>
            <a href="#chrono" class="block py-3 text-xs tracking-[0.15em] uppercase text-gray-500 hover:text-blood-400">Chronologie</a>
        </div>
    </nav>

    <section class="relative min-h-screen flex items-center justify-center px-6 pt-16">
        <div class="absolute inset-0 z-0"><img src="https://picsum.photos/seed/chicago-night-1992-dark/1920/1080.jpg" alt="" class="w-full h-full object-cover opacity-20" style="filter:saturate(0.2) brightness(0.4) hue-rotate(10deg)"><div class="absolute inset-0" style="background:linear-gradient(to bottom,rgba(9,9,26,0.7),rgba(9,9,26,0.4) 40%,rgba(9,9,26,0.8) 80%,#09091a)"></div></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-0 opacity-[0.03]"><svg class="glyph-spin" width="600" height="600" viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="48" stroke="#dc2626" stroke-width="0.3"/><circle cx="50" cy="50" r="35" stroke="#dc2626" stroke-width="0.2"/><polygon points="50,5 95,50 50,95 5,50" stroke="#dc2626" stroke-width="0.3" fill="none"/><polygon points="50,15 85,50 50,85 15,50" stroke="#dc2626" stroke-width="0.2" fill="none" transform="rotate(45 50 50)"/><line x1="50" y1="2" x2="50" y2="98" stroke="#dc2626" stroke-width="0.15"/><line x1="2" y1="50" x2="98" y2="50" stroke="#dc2626" stroke-width="0.15"/></svg></div>
        <div class="relative z-10 text-center max-w-4xl mx-auto">
            <svg class="mx-auto mb-8 opacity-40" width="200" height="40" viewBox="0 0 200 40"><path class="heartbeat-line" d="M0,20 L60,20 L70,20 L80,5 L90,35 L100,10 L110,30 L120,20 L200,20" fill="none" stroke="#dc2626" stroke-width="1.5"/></svg>
            <p class="font-cormorant text-blood-500/70 text-sm tracking-[0.4em] uppercase mb-6" id="hero-subtitle"></p>
            <h1 class="font-cinzel text-5xl sm:text-7xl md:text-8xl font-bold tracking-tight mb-2"><span class="neon-text text-blood-500 neon-flicker" id="hero-year"></span></h1>
            <h2 class="font-cinzel text-2xl sm:text-3xl md:text-4xl tracking-[0.15em] text-gray-400 mt-4 mb-8" id="hero-title"></h2>
            <div class="w-16 h-px bg-blood-700 mx-auto mb-8 blood-drip"></div>
            <blockquote class="font-cormorant italic text-xl sm:text-2xl text-gray-400 leading-relaxed max-w-2xl mx-auto mb-12" id="hero-quote"></blockquote>
            <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
                <button onclick="document.getElementById('rumeurs').scrollIntoView({behavior:'smooth'})" class="group px-8 py-3.5 bg-blood-700/80 hover:bg-blood-600 border border-blood-500/30 text-white font-cinzel text-sm tracking-[0.15em] uppercase transition-all duration-300 hover:shadow-[0_0_30px_rgba(220,38,38,0.3)]">Entrez dans la Nuit <iconify-icon icon="lucide:arrow-down" class="ml-2 inline-block group-hover:translate-y-0.5 transition-transform"></iconify-icon></button>
                <button onclick="openModal('nodModal')" class="px-8 py-3.5 border border-ash-600 text-gray-400 hover:text-blood-400 hover:border-blood-700 font-cinzel text-sm tracking-[0.15em] uppercase transition-all duration-300">Le Livre de Nod</button>
            </div>
        </div>
        <div class="absolute bottom-8 left-1/2 -translate-x-1/2 z-10 flex flex-col items-center gap-2 opacity-40"><span class="text-[10px] tracking-[0.3em] uppercase text-gray-500">Scrollez</span><div class="w-px h-8 bg-gradient-to-b from-blood-700 to-transparent animate-pulse"></div></div>
    </section>

    <div class="relative z-10 border-y border-blood-950/50 bg-blood-950/20 overflow-hidden"><div class="flex ticker-scroll whitespace-nowrap py-3" id="tickerRow"></div></div>

    <section id="rumeurs" class="relative z-10 py-24 px-6"><div class="max-w-6xl mx-auto"><div class="text-center mb-16 fade-in"><span class="text-[10px] tracking-[0.4em] uppercase text-blood-600 font-medium" id="sec-rumors-label"></span><h2 class="font-cinzel text-3xl sm:text-4xl tracking-tight text-gray-200 mt-4" id="sec-rumors-title"></h2><p class="font-cormorant italic text-gray-500 mt-4 text-lg" id="sec-rumors-sub"></p></div><div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6" id="rumorsGrid"></div></div></section>

    <section id="factions" class="relative z-10 py-24 px-6"><div class="max-w-6xl mx-auto"><div class="text-center mb-16 fade-in"><span class="text-[10px] tracking-[0.4em] uppercase text-blood-600 font-medium" id="sec-factions-label"></span><h2 class="font-cinzel text-3xl sm:text-4xl tracking-tight text-gray-200 mt-4" id="sec-factions-title"></h2></div><div class="grid md:grid-cols-3 gap-8" id="factionsGrid"></div></div></section>

    <section id="necro" class="relative z-10 py-24 px-6"><div class="max-w-4xl mx-auto"><div class="text-center mb-16 fade-in"><span class="text-[10px] tracking-[0.4em] uppercase text-blood-600 font-medium" id="sec-necro-label"></span><h2 class="font-cinzel text-3xl sm:text-4xl tracking-tight text-gray-200 mt-4" id="sec-necro-title"></h2><p class="font-cormorant italic text-gray-500 mt-4 text-lg" id="sec-necro-sub"></p></div><div class="space-y-4" id="necroGrid"></div></div></section>

    <section id="contacts" class="relative z-10 py-24 px-6"><div class="max-w-6xl mx-auto"><div class="text-center mb-16 fade-in"><span class="text-[10px] tracking-[0.4em] uppercase text-blood-600 font-medium" id="sec-contacts-label"></span><h2 class="font-cinzel text-3xl sm:text-4xl tracking-tight text-gray-200 mt-4" id="sec-contacts-title"></h2><p class="font-cormorant italic text-gray-500 mt-4 text-lg" id="sec-contacts-sub"></p></div><div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6" id="contactsGrid"></div></div></section>

    <section id="chrono" class="relative z-10 py-24 px-6"><div class="max-w-3xl mx-auto"><div class="text-center mb-16 fade-in"><span class="text-[10px] tracking-[0.4em] uppercase text-blood-600 font-medium" id="sec-chrono-label"></span><h2 class="font-cinzel text-3xl sm:text-4xl tracking-tight text-gray-200 mt-4" id="sec-chrono-title"></h2></div><div class="relative" id="chronoGrid"><div class="absolute left-4 md:left-1/2 top-0 bottom-0 w-px bg-blood-900/30 md:-translate-x-px"></div></div></div></section>

    <section class="relative z-10 py-32 px-6"><div class="max-w-3xl mx-auto text-center fade-in"><svg class="mx-auto mb-8 opacity-20" width="80" height="80" viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="48" stroke="#dc2626" stroke-width="0.5"/><polygon points="50,5 95,50 50,95 5,50" stroke="#dc2626" stroke-width="0.5" fill="none"/><line x1="50" y1="2" x2="50" y2="98" stroke="#dc2626" stroke-width="0.3"/><line x1="2" y1="50" x2="98" y2="50" stroke="#dc2626" stroke-width="0.3"/><circle cx="50" cy="50" r="5" fill="#dc2626" opacity="0.5"/></svg><p class="font-cormorant italic text-xl sm:text-2xl text-gray-400 leading-relaxed mb-8" id="cta-quote"></p><p class="text-[10px] tracking-[0.3em] uppercase text-blood-600 mb-8" id="cta-source"></p><div class="w-16 h-px bg-blood-800 mx-auto mb-8"></div><p class="font-cinzel text-lg text-gray-300 tracking-wide" id="cta-line1"></p><p class="font-cormorant text-gray-500 mt-2" id="cta-line2"></p></div></section>

    <footer class="relative z-10 border-t border-blood-950/30 py-8 px-6"><div class="max-w-6xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4"><div class="flex items-center gap-3"><div class="w-6 h-6 rounded-full border border-blood-800/50 flex items-center justify-center"><div class="w-2 h-2 rounded-full bg-blood-700"></div></div><span class="font-cinzel text-xs tracking-[0.2em] text-gray-600 uppercase" id="footer-text"></span></div><p class="text-[10px] text-gray-700 tracking-wider" id="footer-credit"></p></div></footer>

    <div id="nodModal" class="modal-overlay fixed inset-0 z-[100] flex items-center justify-center p-6" style="background:rgba(0,0,0,0.85);backdrop-filter:blur(8px)">
        <div class="modal-content max-w-lg w-full rounded-xl border border-blood-800/30 bg-night-100 p-8 relative" style="backdrop-filter:blur(16px)">
            <button onclick="closeModal('nodModal')" class="absolute top-4 right-4 text-gray-600 hover:text-blood-400 transition-colors"><iconify-icon icon="lucide:x" width="18"></iconify-icon></button>
            <div class="text-center mb-6"><span class="text-[10px] tracking-[0.3em] uppercase text-blood-600">Fragment sacré</span><h3 class="font-cinzel text-2xl text-gray-200 mt-2" id="nod-title"></h3></div>
            <div class="font-cormorant italic text-gray-400 leading-relaxed space-y-4" id="nod-text"></div>
            <div class="mt-6 pt-4 border-t border-blood-900/20 text-center"><p class="text-[10px] text-gray-600 tracking-wider" id="nod-source"></p></div>
        </div>
    </div>

    <div id="dynamicModals"></div>

    <script>
    // ========== UTILITAIRES ==========
    function mu(text){if(!text)return'';return text.replace(/\n/g,'<br>').replace(/\*([^*]+)\*/g,'<em class="text-blood-400">$1</em>');}
    function D(path){return path.split('.').reduce((o,k)=>o&&o[k],SITE_DATA);}

    // ========== RENDU ==========
    function render(){
        document.getElementById('hero-subtitle').textContent=D('hero.subtitle');
        document.getElementById('hero-year').textContent=D('hero.year');
        document.getElementById('hero-title').textContent=D('hero.title');
        document.getElementById('hero-quote').innerHTML=mu(D('hero.quote'));
        document.getElementById('sec-rumors-label').textContent=D('sec.rumors.label');
        document.getElementById('sec-rumors-title').textContent=D('sec.rumors.title');
        document.getElementById('sec-rumors-sub').textContent=D('sec.rumors.sub');
        document.getElementById('sec-factions-label').textContent=D('sec.factions.label');
        document.getElementById('sec-factions-title').textContent=D('sec.factions.title');
        document.getElementById('sec-necro-label').textContent=D('sec.necro.label');
        document.getElementById('sec-necro-title').textContent=D('sec.necro.title');
        document.getElementById('sec-necro-sub').textContent=D('sec.necro.sub');
        document.getElementById('sec-contacts-label').textContent=D('sec.contacts.label');
        document.getElementById('sec-contacts-title').textContent=D('sec.contacts.title');
        document.getElementById('sec-contacts-sub').textContent=D('sec.contacts.sub');
        document.getElementById('sec-chrono-label').textContent=D('sec.chrono.label');
        document.getElementById('sec-chrono-title').textContent=D('sec.chrono.title');
        document.getElementById('cta-quote').innerHTML=mu(D('cta.quote'));
        document.getElementById('cta-source').textContent=D('cta.source');
        document.getElementById('cta-line1').textContent=D('cta.line1');
        document.getElementById('cta-line2').textContent=D('cta.line2');
        document.getElementById('footer-text').textContent=D('footer.text');
        document.getElementById('footer-credit').textContent=D('footer.credit');
        document.getElementById('nod-title').textContent=D('nod.title');
        document.getElementById('nod-text').innerHTML=mu(D('nod.text'));
        document.getElementById('nod-source').textContent=D('nod.source');
        renderTicker();renderRumors();renderFactions();renderNecro();renderContacts();renderChrono();
        document.querySelectorAll('.fade-in:not(.visible)').forEach(el=>obs.observe(el));
    }

    function renderTicker(){
        let h='';for(let r=0;r<2;r++){SITE_DATA.ticker.forEach(t=>{h+=`<span class="mx-8 text-xs tracking-wider text-gray-600">${mu(t)}</span>`;});}
        document.getElementById('tickerRow').innerHTML=h;
    }

    function renderRumors(){
        const rc={'douteuse':'yellow','confirmée':'red','non vérifiée':'gray','confirmée — urgente':'red','partiellement vérifiée':'yellow','non vérifiée — critique':'red'};
        let h='';SITE_DATA.rumors.forEach(r=>{
            const c=rc[r.reliabilite]||'gray';
            h+=`<div class="flip-card h-64 fade-in" onclick="this.classList.toggle('flipped')"><div class="flip-card-inner">
            <div class="flip-card-front rounded-xl border border-blood-900/40 bg-night-50/80 p-6 flex flex-col justify-between" style="backdrop-filter:blur(8px)"><div><div class="flex items-center gap-2 mb-4"><iconify-icon icon="lucide:ear" class="text-blood-600" width="16"></iconify-icon><span class="text-[10px] tracking-[0.2em] uppercase text-blood-600">Rumeur</span></div><p class="font-cormorant text-lg text-gray-300 leading-relaxed">${mu(r.face)}</p></div><p class="text-[10px] text-gray-600 tracking-wider">Cliquez pour révéler →</p></div>
            <div class="flip-card-back rounded-xl border border-blood-700/40 bg-blood-950/90 p-6 flex flex-col justify-between" style="backdrop-filter:blur(8px)"><div><div class="flex items-center gap-2 mb-4"><iconify-icon icon="lucide:eye" class="text-blood-400" width="16"></iconify-icon><span class="text-[10px] tracking-[0.2em] uppercase text-blood-400">Vérifié ?</span></div><p class="font-cormorant text-lg text-gray-200 leading-relaxed">${mu(r.verso)}</p></div><div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-${c}-600 animate-pulse"></span><span class="text-[10px] text-${c}-600 tracking-wider uppercase">Fiabilité ${r.reliabilite}</span></div></div>
            </div></div>`;
        });document.getElementById('rumorsGrid').innerHTML=h;
    }

    function renderFactions(){
        const icons=['lucide:crown','lucide:flame','lucide:flag'],colors=['blood','blood','amber'];
        let h='';SITE_DATA.factions.forEach((f,i)=>{
            const col=colors[i],clans=f.clans.split(',').map(x=>x.trim()).filter(Boolean);
            h+=`<div class="fade-in group relative rounded-xl border border-blood-900/30 bg-night-50/60 overflow-hidden hover:border-blood-700/40 transition-all duration-500" style="backdrop-filter:blur(8px)"><div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-transparent via-${col}-600 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div><div class="p-8"><div class="w-12 h-12 rounded-lg bg-${col}-900/30 border border-${col}-800/30 flex items-center justify-center mb-6"><iconify-icon icon="${icons[i]}" class="text-${col}-500" width="20"></iconify-icon></div><h3 class="font-cinzel text-xl text-gray-200 mb-2">${f.nom}</h3><p class="text-[10px] tracking-[0.2em] uppercase text-${col}-600 mb-4">${f.sous_titre}</p><p class="font-cormorant text-gray-400 leading-relaxed">${mu(f.description)}</p><div class="mt-6 pt-6 border-t border-blood-900/20"><div class="flex flex-wrap gap-2">${clans.map(c=>`<span class="px-2 py-1 text-[10px] tracking-wider uppercase bg-${col}-900/20 text-${col}-400 rounded">${c}</span>`).join('')}</div></div></div></div>`;
        });document.getElementById('factionsGrid').innerHTML=h;
    }

    function renderNecro(){
        let h='';SITE_DATA.necrologie.forEach((n,i)=>{
            const gl=i===3?' glitch':'',ga=i===3?` data-text="${n.nom}"`:'';
            const ic=i===3?'lucide:help-circle':'lucide:skull';
            h+=`<div class="fade-in group flex items-start gap-6 p-6 rounded-xl border border-blood-900/20 bg-night-50/40 hover:border-blood-800/30 transition-all duration-300" style="backdrop-filter:blur(8px)"><div class="text-center min-w-[60px]"><span class="font-cinzel text-2xl text-blood-600">${n.date}</span><p class="text-[10px] text-gray-600 tracking-wider uppercase">${n.mois}</p></div><div class="flex-1"><h4 class="font-cinzel text-gray-300 group-hover:text-blood-400 transition-colors${gl}"${ga}>${n.nom}</h4><p class="text-xs text-gray-600 tracking-wider mt-1">${n.info}</p><p class="font-cormorant text-gray-500 mt-3">${mu(n.description)}</p></div><iconify-icon icon="${ic}" class="text-blood-900/30 group-hover:text-blood-700/50 transition-colors mt-1" width="18"></iconify-icon></div>`;
        });document.getElementById('necroGrid').innerHTML=h;
    }

    function renderContacts(){
        const cols=['blood','blood','amber','gray'];
        let h='';SITE_DATA.contacts.forEach((c,i)=>{
            const col=cols[i];
            h+=`<div class="fade-in group cursor-pointer" onclick="openContactModal(${i})"><div class="relative rounded-xl overflow-hidden border border-blood-900/20 hover:border-blood-700/30 transition-all duration-500"><img src="${c.photo}" alt="" class="w-full h-72 object-cover group-hover:scale-105 transition-transform duration-700" style="filter:saturate(0.15) brightness(0.5) contrast(1.2)"><div class="absolute inset-0 bg-gradient-to-t from-night-900 via-night-900/40 to-transparent"></div><div class="absolute bottom-0 left-0 right-0 p-5"><p class="text-[10px] tracking-[0.2em] uppercase text-${col}-500 mb-1">${c.role}</p><h4 class="font-cinzel text-lg text-gray-200">${c.nom}</h4><p class="text-xs text-gray-500 mt-1">${c.info}</p></div><div class="absolute top-3 right-3 w-8 h-8 rounded-full bg-${col}-900/50 border border-${col}-700/30 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"><iconify-icon icon="lucide:eye" class="text-${col}-400" width="14"></iconify-icon></div></div></div>`;
        });document.getElementById('contactsGrid').innerHTML=h;
    }

    function openContactModal(i){
        const c=SITE_DATA.contacts[i],col=['blood','blood','amber','gray'][i],label=['Dossier classifié','Dossier','Dossier Anarch','Dossier Nosferatu'][i];
        let h=`<div id="cm" class="modal-overlay fixed inset-0 z-[100] flex items-center justify-center p-6" style="background:rgba(0,0,0,0.85);backdrop-filter:blur(8px)" onclick="if(event.target===this)closeModal('cm')"><div class="modal-content max-w-md w-full rounded-xl border border-${col}-800/30 bg-night-100 p-6 relative"><button onclick="closeModal('cm')" class="absolute top-4 right-4 text-gray-600 hover:text-${col}-400 transition-colors"><iconify-icon icon="lucide:x" width="18"></iconify-icon></button><span class="text-[10px] tracking-[0.2em] uppercase text-${col}-600">${label}</span><h3 class="font-cinzel text-xl text-gray-200 mt-2 mb-4">${c.modal_nom}</h3><div class="space-y-3 font-cormorant text-gray-400">`;
        if(c.modal_clan) h+=`<p><span class="text-gray-500">Clan :</span> ${c.modal_clan}</p>`;
        if(c.modal_gen) h+=`<p><span class="text-gray-500">Génération :</span> ${c.modal_gen}</p>`;
        if(c.modal_role) h+=`<p><span class="text-gray-500">Rôle :</span> ${c.modal_role}</p>`;
        if(c.modal_apparence) h+=`<p><span class="text-gray-500">Apparence :</span> ${mu(c.modal_apparence)}</p>`;
        if(c.modal_derniere) h+=`<p><span class="text-gray-500">Dernière apparition :</span> ${c.modal_derniere}</p>`;
        if(c.modal_note) h+=`<p><span class="text-gray-500">Note :</span> ${mu(c.modal_note)}</p>`;
        h+=`</div></div></div>`;
        document.getElementById('dynamicModals').innerHTML=h;
        requestAnimationFrame(()=>document.getElementById('cm').classList.add('active'));
    }

    function renderChrono(){
        const line=`<div class="absolute left-4 md:left-1/2 top-0 bottom-0 w-px bg-blood-900/30 md:-translate-x-px"></div>`;
        let h=line;SITE_DATA.chronologie.forEach((e,i)=>{
            const right=i%2===0,last=i===SITE_DATA.chronologie.length-1;
            const dot=last?'bg-blood-500 animate-pulse':'bg-blood-700';
            const dtClass=last?'text-blood-400':'text-blood-600';
            if(right){h+=`<div class="fade-in relative flex md:justify-end mb-12 md:pr-[calc(50%+2rem)] pl-12 md:pl-0"><div class="absolute left-2.5 md:left-1/2 top-1 w-3 h-3 rounded-full ${dot} border-2 border-night-500 md:-translate-x-1.5"></div><div class="max-w-md"><span class="text-[10px] tracking-[0.2em] uppercase ${dtClass}">${e.date}</span><h4 class="font-cinzel text-gray-200 mt-1">${e.titre}</h4><p class="font-cormorant text-gray-500 mt-2">${mu(e.description)}</p></div></div>`;}
            else{h+=`<div class="fade-in relative flex md:justify-start mb-12 md:pl-[calc(50%+2rem)] pl-12"><div class="absolute left-2.5 md:left-1/2 top-1 w-3 h-3 rounded-full ${dot} border-2 border-night-500 md:-translate-x-1.5"></div><div class="max-w-md"><span class="text-[10px] tracking-[0.2em] uppercase ${dtClass}">${e.date}</span><h4 class="font-cinzel text-gray-200 mt-1">${e.titre}</h4><p class="font-cormorant text-gray-500 mt-2">${mu(e.description)}</p></div></div>`;}
        });document.getElementById('chronoGrid').innerHTML=h;
    }

    // ========== MODALS ==========
    function openModal(id){document.getElementById(id).classList.add('active');document.body.style.overflow='hidden';}
    function closeModal(id){const el=document.getElementById(id);if(el)el.classList.remove('active');document.body.style.overflow='';}
    document.querySelectorAll('.modal-overlay').forEach(o=>{o.addEventListener('click',e=>{if(e.target===o){o.classList.remove('active');document.body.style.overflow='';}});});
    document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.querySelectorAll('.modal-overlay.active').forEach(m=>m.classList.remove('active'));document.body.style.overflow='';}});

    // ========== PLUIE ==========
    (function(){const c=document.getElementById('rain'),n=innerWidth<768?40:80;for(let i=0;i<n;i++){const d=document.createElement('div');d.className='raindrop';d.style.left=Math.random()*100+'%';d.style.height=Math.random()*20+10+'px';d.style.animationDuration=Math.random()*1.5+0.5+'s';d.style.animationDelay=Math.random()*3+'s';d.style.opacity=Math.random()*0.5+0.1;c.appendChild(d);}})();

    // ========== SCROLL ==========
    const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible');});},{threshold:0.1,rootMargin:'0px 0px -50px 0px'});

    // ========== MENU ==========
    document.getElementById('menuBtn').addEventListener('click',()=>document.getElementById('mobileMenu').classList.toggle('hidden'));
    document.querySelectorAll('#mobileMenu a').forEach(a=>a.addEventListener('click',()=>document.getElementById('mobileMenu').classList.add('hidden')));
    document.querySelectorAll('a[href^="#"]').forEach(a=>{a.addEventListener('click',function(e){e.preventDefault();const t=document.querySelector(this.getAttribute('href'));if(t)t.scrollIntoView({behavior:'smooth',block:'start'});});});

    // ========== INIT ==========
    render();
    </script>
</body>
</html>
